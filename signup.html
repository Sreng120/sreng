<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Khmer Food Login</title>
    <link rel="stylesheet" href="../Group 2/signup.css" />
    <link rel="icon" type="image/png" href="../Pic/logo 1.avif" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <!-- Left -->
      <div class="left">
        <div class="logo">Khmer Food</div>

        <h2>CREATE ACCOUNT</h2>
        <div class="name-row">
          <div class="input-name">
            <label>First Name</label>
            <input type="text" placeholder="First Name" />
          </div>
          <div class="input-name">
            <label>Last Name</label>
            <input type="text" placeholder="Last Name" />
          </div>
        </div>
        <div class="input-group">
          <label>Email</label>
          <input type="text" placeholder="example@gmail.com" />
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" placeholder="••••••••" />
        </div>

        <div class="options">
          <label><input type="checkbox" /> Remember me</label>
        </div>

        <button>
          <a href="../Group 2/login.html"> CREATE ACCOUNT</a>
        </button>
        <p class="login-text">
          Already have an account?
          <a href="../Group 2/login.html">Log in</a>
        </p>
      </div>

      <!-- Right -->
      <div class="right">
        <div class="circle">
          <img src="../Pic/cook.foood.png" alt="logo khmer foods" />
        </div>

        <div class="social">
          <a href="https://x.com/kim_sreng16?s=21"
            ><i class="fab fa-twitter"></i
          ></a>
          <a href="https://t.me/ken_zo06"><i class="fab fa-telegram"></i></a>
          <a
            href="https://www.instagram.com/sreng_71?igsh=Mzhydm93dGx5am5z&utm_source=qr"
            ><i class="fab fa-instagram"></i
          ></a>
          <a href="https://www.facebook.com/share/1HDFeJsF9w/?mibextid=wwXIfr"
            ><i class="fab fa-facebook-f"></i
          ></a>
        </div>
      </div>
    </div>
  </body>
</html>
